name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck + test (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build (tsc)
        run: npm run build

  binary:
    name: bun single-binary build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Compile binary
        run: npm run build:binary

      - name: Smoke test binary
        run: ./dist/agentctl agents list

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: agentctl-linux-x64
          path: dist/agentctl
          if-no-files-found: error
